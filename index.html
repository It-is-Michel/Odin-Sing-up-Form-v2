<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="modern-normalize.css">
  <title>Odin - Sing up Form v2</title>
</head>
<body>

  <div class="web-wrapper">

    <div class="left-display">

      <div class="left-display__logotype-container">
          <div class="left-display__join">Join the</div>
          <div class="left-display__logotype">3D Printing Fair</div>
      </div>

      <p class="left-display__image-copyright">Photo by <a class="left-display__credits" href="https://www.pexels.com/photo/3d-printer-creating-text-just-live-in-workshop-30640195/" target="_blank" rel="noopener noreferrer">Melih Can</a></p>

    </div>

    <div class="right-side">

      <p class="form-context">Type in <span class="bold">fake</span> data to join a <span class="bold">fake</span> 3D Printing Fair! You will be able to show what you do, just don't forget to bring your 3D printer to create new pieces in place.</p>

      <form action="#" method="post" class="registration-form">

        <h1>Create your account to join the 3D Printing Fair!</h1>

        <label for="user-first-name">
          First name:
          <input type="text" id="input-user-first-name" name="firstName" autocomplete="given-name" required>
        </label>

        <label for="user-last-name">
          Last name:
          <input type="text" id="input-user-last-name" name="lastName" autocomplete="family-name">
        </label>

        <label for="user-email">
          Email:
          <input type="email" id="input-user-email" name="email" autocomplete="email" required>
        </label>

        <label for="input-user-tel">
          Phone number:
          <input type="tel" id="input-user-tel" name="tel" autocomplete="tel">
        </label>

        <label for="input-user-new-password">
          New password:
          <input type="password" id="input-user-new-password" name="password" autocomplete="new-password" required>
        </label>

        <label for="input-user-confirm-new-password">
          Confirm new password:
          <input type="password" id="input-user-confirm-new-password" name="password" autocomplete="new-password" required>
        </label>

        <button type="submit">Create account</button>

      </form>

      <p>Already have an accout? <a href="">Log in</a></p>

    </div>

  </div>

</body>
</html>
