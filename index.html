<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="modern-normalize.css">
  <title>Odin - Sing up Form v2</title>
</head>
<body>

  <div class="web-wrapper">

    <div class="left-display">

      <div class="left-display__logotype-container">
          <div class="left-display__join">Join the</div>
          <div class="left-display__logotype">3D Printing Fair</div>
      </div>

      <p class="left-display__image-copyright">Photo by <a class="left-display__credits" href="https://www.pexels.com/photo/3d-printer-creating-text-just-live-in-workshop-30640195/" target="_blank" rel="noopener noreferrer">Melih Can</a></p>

    </div>

    <div class="right-side">

      <p class="form-context">Type in <span class="italic">fake</span> data to join a <span class="italic">fake</span> 3D Printing Fair! You will be able to show what you do, just don't forget to bring your 3D printer to create new pieces in place.</p>

      <form class="create-account-form" action="#" method="post" class="registration-form">

        <div class="create-account-form__inputs-wrapper">

          <h1 class="create-account-form__header">Create your account to join the 3D Printing Fair!</h1>

          <div class="create-account-form__name-inputs">

            <label class="create-account-form__labels" for="user-first-name">
              First name:
              <input class="create-account-form__input" type="text" id="input-user-first-name" name="firstName" autocomplete="given-name" required>
            </label>

            <label class="create-account-form__labels" for="user-last-name">
              Last name:
              <input class="create-account-form__input" type="text" id="input-user-last-name" name="lastName" autocomplete="family-name">
            </label>

          </div>

          <div class="create-account-form__contact-inputs">

            <label class="create-account-form__labels" for="user-email">
              Email:
              <input class="create-account-form__input" type="email" id="input-user-email" name="email" autocomplete="email" required>
            </label>

            <label class="create-account-form__labels" for="input-user-tel">
              Phone number:
              <input class="create-account-form__input" type="tel" id="input-user-tel" name="tel" autocomplete="tel">
            </label>

          </div>

          <div class="create-account-form__password-inputs">
            
            <label class="create-account-form__labels" for="input-user-new-password">
              New password:
              <input class="create-account-form__input" type="password" id="input-user-new-password" name="password" autocomplete="new-password" required>
            </label>

            <label class="create-account-form__labels" for="input-user-confirm-new-password">
              Confirm new password:
              <input class="create-account-form__input" type="password" id="input-user-confirm-new-password" name="password" autocomplete="new-password" required>
            </label>

          </div>

        </div>

        <button class="create-account-form__submit-button"" type="submit">Create account</button>

      </form>

      <p class="login-text">Already have an accout? <a href="">Log in</a></p>

    </div>

  </div>

</body>
</html>
